<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Layout</title>
    <style>
        body { font-family: sans-serif; max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        label { display: block; font-weight: bold; margin-top: 0; margin-bottom: 4px; }
        textarea, input { width: 100%; box-sizing: border-box; font-family: monospace; font-size: 13px; }
        button { margin-top: 12px; padding: 8px 20px; font-size: 14px; cursor: pointer; }
        #status { margin-top: 8px; font-size: 13px; color: #555; }
        #output { margin-top: 16px; border: 1px solid #ccc; padding: 8px; min-height: 100px; }
        .inputs-row { display: flex; gap: 16px; align-items: flex-start; margin-top: 12px; }
        .inputs-row > div { flex: 1; }
    </style>
</head>
<body>
    <h2>Parking Layout Generator</h2>

    <div class="inputs-row">
        <div>
            <label for="wkt">WKT Geometry</label>
            <textarea id="wkt" rows="6" placeholder="e.g. LINESTRING(0 0, 10 0, 10 10)"></textarea>
        </div>
        <div>
            <label for="params">Parking Params JSON</label>
            <textarea id="params" rows="6" placeholder='e.g. {"angle": 90, "width": 2.5, "length": 5.0}'></textarea>
        </div>
    </div>

    <button id="generateBtn" disabled>Generate SVG</button>
    <div id="status">Loading WASM module...</div>

    <div id="output"></div>

    <script src="../bin/parking.js"></script>
    <script>
        let parkingModule = null;

        ParkingModule().then(function (m) {
            parkingModule = m;
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('status').textContent = 'Ready.';
        }).catch(function (err) {
            document.getElementById('status').textContent = 'Failed to load WASM: ' + err;
        });

        document.getElementById('generateBtn').addEventListener('click', function () {
            if (!parkingModule) return;
            const wkt    = document.getElementById('wkt').value.trim();
            const params = document.getElementById('params').value.trim();
            const svg = parkingModule.generate_svg(wkt, params);
            const output = document.getElementById('output');
            if (svg) {
                output.innerHTML = svg;
                document.getElementById('status').textContent = 'SVG generated successfully.';
            } else {
                output.innerHTML = '';
                document.getElementById('status').textContent = 'generate_svg returned empty — check inputs.';
            }
        });
    </script>
</body>
</html>
